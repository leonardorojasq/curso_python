<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<form>
  <!-- El atributo disabled bloquea todo el grupo automáticamente -->
  <fieldset disabled>
    <legend>Formulario Deshabilitado</legend>
    
    <div class="mb-3">
      <label for="disabledInput" class="form-label">Input bloqueado</label>
      <input type="text" id="disabledInput" class="form-control" placeholder="No puedes escribir aquí">
    </div>
    
    <div class="mb-3">
      <label for="disabledSelect" class="form-label">Select bloqueado</label>
      <select id="disabledSelect" class="form-select">
        <option>Opción deshabilitada</option>
      </select>
    </div>
    
    <button type="submit" class="btn btn-primary">Enviar</button>
  </fieldset>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
